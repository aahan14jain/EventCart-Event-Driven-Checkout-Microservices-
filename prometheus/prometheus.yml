# Local EventCart scrape config. Java services are expected on the Docker host
# (e.g. ./mvnw spring-boot:run) so targets use host.docker.internal.
# Linux: prometheus service sets extra_hosts host.docker.internal:host-gateway in docker-compose.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # order-service default server.port=8080 (override with SERVER_PORT=… in application.properties).
  - job_name: order-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          application: order-service

  - job_name: inventory-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8081"]
        labels:
          application: inventory-service

  - job_name: payment-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8082"]
        labels:
          application: payment-service
